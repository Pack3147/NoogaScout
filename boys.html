<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoogaScout - Troop 147 (Boys)</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        var pageTitle = "Troop 147 (Boys)";
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                file = elmnt.getAttribute("include-html");
                if (file) {
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function() {
                        if (this.readyState == 4) {
                            if (this.status == 200) {
                                elmnt.innerHTML = this.responseText;
                                if (elmnt.getAttribute("include-html") === "header.html") {
                                    document.getElementById('page-title').innerText = pageTitle || "NoogaScout";
                                }
                            }
                            if (this.status == 404) {
                                elmnt.innerHTML = "Page not found.";
                            }
                            elmnt.removeAttribute("include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    return;
                }
            }
        }
    </script>
</head>
<body id="boys-page" class="theme-boys" onload="includeHTML()">
    <div include-html="header.html"></div>

    <main class="sub-page">
        <div class="content">
            <h2>Troop 147 (Boys)</h2>
            <p>This is a placeholder page for the boys troop. The page uses the troop's red color palette.</p>
            <p>Content and links specific to Troop 147 can be added here.</p>
            <div style="margin-top:20px;">
                <a href="units.html" class="card-button" style="width:180px; display:inline-block; border-radius:6px;">Back to Units</a>
            </div>
        </div>
    </main>

    <div include-html="footer.html"></div>
</body>
</html>
