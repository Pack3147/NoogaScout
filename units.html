<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoogaScout - Units</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        var pageTitle = "Units & Troops";
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                file = elmnt.getAttribute("include-html");
                if (file) {
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function() {
                        if (this.readyState == 4) {
                            if (this.status == 200) {
                                elmnt.innerHTML = this.responseText;
                                if (elmnt.getAttribute("include-html") === "header.html") {
                                    document.getElementById('page-title').innerText = pageTitle || "NoogaScout";
                                }
                            }
                            if (this.status == 404) {
                                elmnt.innerHTML = "Page not found.";
                            }
                            elmnt.removeAttribute("include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    return;
                }
            }
        }
    </script>
</head>
<body id="units-page" class="theme-hub" onload="includeHTML()">
    <div include-html="header.html"></div>

    <main class="sub-page">
        <div class="content">
            <h2>Welcome to NoogaScout Units</h2>
            <p>This landing page is the central hub for our Pack and Troops. Select a unit to visit their specific pages and information.</p>

            <div class="service-container">
                <a href="index.html" class="card-button" style="width:220px; display:block; border-radius:8px;">Pack 3147 (Pack)</a>
                <a href="boys.html" class="card-button" style="width:220px; display:block; border-radius:8px;">Troop 147 (Boys)</a>
                <a href="girls.html" class="card-button" style="width:220px; display:block; border-radius:8px;">Troop 1147 (Girls)</a>
            </div>
        </div>
    </main>

    <div include-html="footer.html"></div>
</body>
</html>
